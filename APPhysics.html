<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AP Physics 1 — Georgia Standards Learning Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c18;--bg2:#0c1220;--bg3:#101829;--card:#131e32;--card2:#182540;
  --accent:#5b9cf6;--accent2:#8b5cf6;--accent3:#06d6a0;--accent4:#f97316;
  --text:#dde6f8;--text2:#8ba4cc;--text3:#4e6a94;
  --border:#1e304e;--border2:#2a4068;
  --green:#06d6a0;--red:#f87171;--yellow:#fbbf24;
  --sidebar-w:290px;
}

html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;overflow-x:hidden}

/* Scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ─── LAYOUT ─── */
.app{display:flex;min-height:100vh}

/* ─── SIDEBAR ─── */
.sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;height:100vh;
  overflow-y:auto;z-index:100;
}
.sidebar-logo{padding:28px 24px 20px;border-bottom:1px solid var(--border)}
.logo-mark{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-text{font-size:20px;font-weight:800;letter-spacing:-0.5px;color:var(--text)}
.logo-sub{font-size:11px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;font-weight:500}
.ga-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(91,156,246,.1);border:1px solid rgba(91,156,246,.2);color:var(--accent);font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;margin-top:8px;letter-spacing:.8px;text-transform:uppercase}

.nav-group-label{padding:16px 24px 6px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:2px}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;margin:2px 10px;
  border-radius:10px;cursor:pointer;
  font-size:13px;color:var(--text2);font-weight:500;
  border:1px solid transparent;background:none;width:calc(100% - 20px);text-align:left;
  transition:all .2s;
}
.nav-item:hover{background:var(--bg3);color:var(--text);border-color:var(--border)}
.nav-item.active{background:linear-gradient(135deg,rgba(91,156,246,.12),rgba(139,92,246,.08));color:var(--accent);border-color:rgba(91,156,246,.25)}
.nav-emoji{font-size:16px;width:22px;text-align:center}
.nav-qlabel{margin-left:auto;font-family:'DM Mono',monospace;font-size:10px;background:var(--bg3);border:1px solid var(--border);padding:2px 7px;border-radius:5px;color:var(--text3)}
.nav-item.active .nav-qlabel{background:rgba(91,156,246,.15);border-color:rgba(91,156,246,.3);color:var(--accent)}

.sidebar-footer{margin-top:auto;padding:16px 20px;border-top:1px solid var(--border)}
.prog-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:6px}
.prog-bar{background:var(--bg3);border-radius:4px;height:5px;overflow:hidden;border:1px solid var(--border)}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width .4s ease}

/* ─── MAIN ─── */
.main{margin-left:var(--sidebar-w);flex:1;min-height:100vh;overflow-y:auto}
.content{padding:36px 44px;max-width:960px;margin:0 auto}

/* ─── PAGE HEADER ─── */
.page-header{margin-bottom:32px}
.unit-chip{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(91,156,246,.08);border:1px solid rgba(91,156,246,.2);
  color:var(--accent);font-size:10px;font-weight:700;
  padding:4px 12px;border-radius:20px;margin-bottom:14px;
  letter-spacing:1px;text-transform:uppercase;
}
.page-title{
  font-size:42px;font-weight:800;letter-spacing:-1.5px;line-height:1.05;margin-bottom:10px;
  background:linear-gradient(130deg,var(--text) 0%,var(--accent) 60%,var(--accent2) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.page-subtitle{color:var(--text2);font-size:14px;line-height:1.7;max-width:640px;font-weight:400}

/* ─── TABS ─── */
.tabs{display:flex;gap:3px;margin-bottom:28px;background:var(--bg2);padding:4px;border-radius:12px;width:fit-content;border:1px solid var(--border)}
.tab-btn{padding:8px 22px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text3);transition:all .2s;border:none;background:none;font-family:'Syne',sans-serif}
.tab-btn:hover{color:var(--text2)}
.tab-btn.active{background:var(--card);color:var(--text);box-shadow:0 1px 6px rgba(0,0,0,.4)}

/* ─── DASHBOARD ─── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
.stat-card{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:20px 18px;position:relative;overflow:hidden;
}
.stat-card::before{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;background:var(--accent);opacity:.04}
.stat-val{font-size:32px;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:4px;font-weight:600}

.units-header{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:2px;margin-bottom:12px}
.unit-row{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:16px 20px;display:flex;align-items:center;gap:14px;
  cursor:pointer;transition:all .2s;margin-bottom:8px;
}
.unit-row:hover{border-color:var(--border2);transform:translateX(4px);background:var(--card2)}
.unit-icon-box{width:46px;height:46px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.unit-info{flex:1}
.unit-name{font-size:14px;font-weight:700;color:var(--text)}
.unit-desc{font-size:12px;color:var(--text3);margin-top:2px;line-height:1.5}
.unit-meta{display:flex;align-items:center;gap:8px}
.q-pill{font-size:11px;font-family:'DM Mono',monospace;background:var(--bg3);border:1px solid var(--border);padding:3px 10px;border-radius:20px;color:var(--text2)}
.arrow{color:var(--text3);font-size:20px}

/* ─── CONCEPT CARDS ─── */
.concept-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px}
.concept-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;transition:border-color .2s}
.concept-card:hover{border-color:var(--border2)}
.cc-icon{font-size:26px;margin-bottom:10px}
.cc-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px}
.cc-desc{font-size:13px;color:var(--text2);line-height:1.65;font-weight:400}

.formulas-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 22px;margin-bottom:22px}
.formulas-title{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.formulas-title::before{content:'';width:3px;height:13px;background:var(--accent);border-radius:2px;display:inline-block}
.formulas-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.formula-chip{background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;font-family:'DM Mono',monospace;font-size:13px;color:var(--accent3);text-align:center}

.diagram-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:22px}
.diagram-title-bar{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.diagram-title-bar::before{content:'';width:3px;height:13px;background:var(--accent2);border-radius:2px;display:inline-block}

/* ─── QUESTIONS ─── */
.q-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.q-counter-label{font-size:13px;color:var(--text3);font-weight:500}
.score-chip{font-family:'DM Mono',monospace;font-size:12px;background:var(--bg2);border:1px solid var(--border);padding:5px 14px;border-radius:20px;color:var(--text2)}

.question-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:26px;margin-bottom:16px}
.diff-badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:3px 9px;border-radius:5px;margin-bottom:10px;letter-spacing:.5px;text-transform:uppercase}
.diff-easy{background:rgba(6,214,160,.1);color:var(--green)}
.diff-med{background:rgba(251,191,36,.1);color:var(--yellow)}
.diff-hard{background:rgba(248,113,113,.1);color:var(--red)}

.q-number{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.q-text{font-size:15px;color:var(--text);line-height:1.65;margin-bottom:18px;font-weight:400}
.q-options{display:flex;flex-direction:column;gap:8px}
.opt{
  display:flex;align-items:flex-start;gap:12px;padding:13px 16px;
  border:1px solid var(--border);border-radius:10px;cursor:pointer;
  transition:all .2s;background:transparent;
}
.opt:hover{border-color:var(--border2);background:var(--bg3)}
.opt.selected{border-color:var(--accent);background:rgba(91,156,246,.07)}
.opt.correct{border-color:var(--green);background:rgba(6,214,160,.07);cursor:default}
.opt.wrong{border-color:var(--red);background:rgba(248,113,113,.07);cursor:default}
.opt-key{
  width:28px;height:28px;min-width:28px;border-radius:7px;
  background:var(--bg);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text3);
  flex-shrink:0;
}
.opt.selected .opt-key{background:rgba(91,156,246,.2);border-color:var(--accent);color:var(--accent)}
.opt.correct .opt-key{background:rgba(6,214,160,.2);border-color:var(--green);color:var(--green)}
.opt.wrong .opt-key{background:rgba(248,113,113,.2);border-color:var(--red);color:var(--red)}
.opt-text{font-size:13px;color:var(--text);padding-top:4px;line-height:1.5;font-weight:400}
.explanation{
  margin-top:14px;padding:13px 16px;
  background:var(--bg2);border-left:3px solid var(--accent3);
  border-radius:0 10px 10px 0;font-size:13px;color:var(--text2);line-height:1.65;font-weight:400
}
.explanation strong{color:var(--accent3)}

.q-nav-bar{display:flex;align-items:center;justify-content:space-between;margin-top:14px;gap:12px}
.q-dots{display:flex;gap:4px;flex-wrap:wrap;max-width:380px}
.dot{width:9px;height:9px;border-radius:50%;background:var(--border2);cursor:pointer;transition:all .2s}
.dot.current{background:var(--accent);transform:scale(1.4)}
.dot.ok{background:var(--green)}
.dot.bad{background:var(--red)}
.btn{padding:10px 22px;border-radius:9px;border:none;cursor:pointer;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;transition:all .2s}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:not(:disabled):hover{background:#74aeff;transform:translateY(-1px)}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-outline:not(:disabled):hover{border-color:var(--accent);color:var(--accent)}

/* ─── SVG diagrams ─── */
.svg-diag{width:100%;height:auto;border-radius:8px}

/* ─── Responsive ─── */
@media(max-width:900px){
  :root{--sidebar-w:64px}
  .sidebar-logo,.nav-group-label,.nav-item span:not(.nav-emoji),.nav-qlabel,.sidebar-footer .prog-label,.sidebar-footer .prog-bar,.sidebar-footer .prog-fill{display:none}
  .nav-item{justify-content:center;padding:12px}
  .nav-emoji{width:auto}
  .content{padding:24px 20px}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .concept-grid{grid-template-columns:1fr}
  .formulas-grid{grid-template-columns:1fr}
  .page-title{font-size:28px}
}
</style>
</head>
<body>
<div class="app">

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">
      <div class="logo-icon">⚛</div>
      <div class="logo-text">PhysicsAP</div>
    </div>
    <div class="logo-sub">AP Physics 1</div>
    <div class="ga-badge">🍑 Georgia Standards</div>
  </div>

  <div class="nav-group-label">Navigation</div>
  <button class="nav-item active" onclick="showPage('dashboard')" id="nav-dashboard">
    <span class="nav-emoji">🏠</span><span>Dashboard</span>
  </button>

  <div class="nav-group-label">Course Units</div>
  <button class="nav-item" onclick="showUnit(0)" id="nav-u0"><span class="nav-emoji">🏃</span><span>Kinematics</span><span class="nav-qlabel">50Q</span></button>
  <button class="nav-item" onclick="showUnit(1)" id="nav-u1"><span class="nav-emoji">⚡</span><span>Dynamics & Forces</span><span class="nav-qlabel">50Q</span></button>
  <button class="nav-item" onclick="showUnit(2)" id="nav-u2"><span class="nav-emoji">💥</span><span>Work & Energy</span><span class="nav-qlabel">50Q</span></button>
  <button class="nav-item" onclick="showUnit(3)" id="nav-u3"><span class="nav-emoji">🌀</span><span>Momentum</span><span class="nav-qlabel">50Q</span></button>
  <button class="nav-item" onclick="showUnit(4)" id="nav-u4"><span class="nav-emoji">⭕</span><span>Circular Motion</span><span class="nav-qlabel">50Q</span></button>
  <button class="nav-item" onclick="showUnit(5)" id="nav-u5"><span class="nav-emoji">〰️</span><span>Simple Harmonic</span><span class="nav-qlabel">50Q</span></button>
  <button class="nav-item" onclick="showUnit(6)" id="nav-u6"><span class="nav-emoji">🔄</span><span>Rotational Motion</span><span class="nav-qlabel">50Q</span></button>
  <button class="nav-item" onclick="showUnit(7)" id="nav-u7"><span class="nav-emoji">🔊</span><span>Waves & Sound</span><span class="nav-qlabel">50Q</span></button>

  <div class="sidebar-footer">
    <div class="prog-label"><span>Progress</span><span id="prog-pct">0%</span></div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
</aside>

<!-- MAIN CONTENT -->
<main class="main">
  <div class="content" id="main"></div>
</main>

</div>

<script>
// ─────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────
const UNITS=[
{id:0,icon:'🏃',tag:'Unit 1',title:'Kinematics',sub:'Motion in 1D & 2D — displacement, velocity, acceleration, projectile motion',
concepts:[
{icon:'📏',title:'Displacement vs Distance',desc:'Displacement is the vector change in position (Δx = x_f − x_i). Distance is total path length. A round trip has zero displacement but nonzero distance.'},
{icon:'🚀',title:'Velocity & Acceleration',desc:'Average velocity = Δx/Δt. Instantaneous velocity = slope of x-t graph. Acceleration = rate of change of velocity = slope of v-t graph.'},
{icon:'📐',title:'Kinematic Equations (SUVAT)',desc:'Four equations link displacement, velocity, acceleration, and time for constant acceleration. Only valid when acceleration is constant throughout.'},
{icon:'🏀',title:'Projectile Motion',desc:'Horizontal (constant v_x) and vertical (free fall with g) are independent. Range = v₀²sin(2θ)/g is maximum at θ = 45°.'},
],
formulas:['v = v₀ + at','x = x₀ + v₀t + ½at²','v² = v₀² + 2aΔx','x = (v + v₀)/2 · t'],
questions:genKinematics(),
diagram:'kinematics'
},
{id:1,icon:'⚡',tag:'Unit 2',title:'Dynamics & Forces',sub:'Newton\'s Laws, free body diagrams, friction, normal force, tension',
concepts:[
{icon:'⚖️',title:'Newton\'s 1st Law',desc:'An object at rest stays at rest, and an object in motion stays in motion at constant velocity, unless acted on by a net external force. Inertia resists changes in motion.'},
{icon:'➡️',title:'Newton\'s 2nd Law',desc:'Net force = mass × acceleration: ΣF = ma. Force is a vector. All forces must be summed vectorially. Units: Newtons (N = kg·m/s²).'},
{icon:'↔️',title:'Newton\'s 3rd Law',desc:'For every action force, there is an equal and opposite reaction force. Pairs act on DIFFERENT objects — they never cancel each other.'},
{icon:'🔴',title:'Friction',desc:'Static friction ≤ μₛN prevents motion. Kinetic friction fₖ = μₖN opposes sliding. Always μₖ < μₛ. Friction is independent of contact area.'},
],
formulas:['ΣF = ma','fₖ = μₖN','fₛ ≤ μₛN','W = mg'],
questions:genDynamics(),
diagram:'dynamics'
},
{id:2,icon:'💥',tag:'Unit 3',title:'Work & Energy',sub:'Work-energy theorem, KE, PE, conservation of energy, power',
concepts:[
{icon:'🔨',title:'Work',desc:'W = Fd cosθ. Work is done only when force has a component along displacement. Positive work aids motion; negative work opposes it. Units: Joules.'},
{icon:'⚡',title:'Kinetic Energy',desc:'KE = ½mv². Doubling speed quadruples KE. Work-energy theorem: W_net = ΔKE = ½mv² − ½mv₀².'},
{icon:'🏔️',title:'Potential Energy',desc:'Gravitational PE = mgh. Spring PE = ½kx². Stored energy due to position or configuration that can convert to KE.'},
{icon:'🔒',title:'Conservation of Energy',desc:'Without non-conservative forces, total mechanical energy (KE + PE) is conserved. Friction converts ME to thermal energy.'},
],
formulas:['W = Fd cosθ','KE = ½mv²','PE = mgh','PE_spring = ½kx²','P = W/t = Fv'],
questions:genEnergy(),
diagram:'energy'
},
{id:3,icon:'🌀',tag:'Unit 4',title:'Momentum & Impulse',sub:'Linear momentum, impulse, conservation, elastic & inelastic collisions',
concepts:[
{icon:'💪',title:'Linear Momentum',desc:'p = mv. A vector in the direction of velocity. Units: kg·m/s. A large slow mass can have the same momentum as a small fast mass.'},
{icon:'💥',title:'Impulse',desc:'J = FΔt = Δp. Impulse equals change in momentum. Area under F-t graph = impulse. Airbags work by increasing Δt to reduce force.'},
{icon:'🔒',title:'Conservation',desc:'Total momentum of an isolated system is conserved: Σp_before = Σp_after. Applies to all collisions and explosions.'},
{icon:'🎱',title:'Collision Types',desc:'Elastic: KE + momentum conserved. Inelastic: momentum conserved, KE not. Perfectly inelastic: stick together, max KE lost.'},
],
formulas:['p = mv','J = FΔt = Δp','p₁ᵢ + p₂ᵢ = p₁f + p₂f','KE = p²/2m'],
questions:genMomentum(),
diagram:'momentum'
},
{id:4,icon:'⭕',tag:'Unit 5',title:'Circular Motion & Gravity',sub:'Centripetal acceleration, universal gravitation, orbital mechanics',
concepts:[
{icon:'🔄',title:'Centripetal Acceleration',desc:'a_c = v²/r, directed toward center. It is NOT a new force — it is the net inward force provided by real forces (friction, tension, gravity).'},
{icon:'🌍',title:'Universal Gravitation',desc:'F = Gm₁m₂/r². G = 6.67×10⁻¹¹ N·m²/kg². Inverse square law — doubling distance reduces force to ¼.'},
{icon:'🪐',title:'Orbital Motion',desc:'Gravity provides centripetal force: v_orbit = √(GM/r). Period: T² ∝ r³ (Kepler\'s 3rd Law). Higher orbit = slower speed.'},
{icon:'⚖️',title:'Apparent Weight',desc:'At loop top: N = mv²/r − mg. At bottom: N = mv²/r + mg. Weightlessness occurs when in free fall (orbit).'},
],
formulas:['a_c = v²/r','F_c = mv²/r','F_g = Gm₁m₂/r²','T² = (4π²/GM)r³'],
questions:genCircular(),
diagram:'circular'
},
{id:5,icon:'〰️',tag:'Unit 6',title:'Simple Harmonic Motion',sub:'Springs, pendulums, period, frequency, amplitude, SHM energy',
concepts:[
{icon:'🌀',title:'SHM Basics',desc:'Restoring force F = −kx (Hooke\'s Law). Motion is sinusoidal. Period is independent of amplitude for ideal springs and small-angle pendulums.'},
{icon:'⏱️',title:'Spring-Mass Period',desc:'T = 2π√(m/k). Period increases with more mass, decreases with stiffer spring. DOES NOT depend on gravity.'},
{icon:'🕰️',title:'Pendulum Period',desc:'T = 2π√(L/g). Depends on length and gravity only — NOT on mass or amplitude (small angles). Longer pendulum → longer period.'},
{icon:'⚡',title:'Energy in SHM',desc:'E = ½kA² (constant). At equilibrium: all KE. At amplitude: all PE. Energy oscillates between KE and PE continuously.'},
],
formulas:['F = −kx (Hooke\'s Law)','T_spring = 2π√(m/k)','T_pendulum = 2π√(L/g)','E = ½kA²'],
questions:genSHM(),
diagram:'shm'
},
{id:6,icon:'🔄',tag:'Unit 7',title:'Rotational Motion',sub:'Angular kinematics, torque, moment of inertia, angular momentum, rolling',
concepts:[
{icon:'📐',title:'Angular Kinematics',desc:'θ (angle), ω (angular velocity), α (angular acceleration). Links to linear: v = rω, a = rα, s = rθ. Same kinematic equations as linear, with angular vars.'},
{icon:'🔧',title:'Torque',desc:'τ = rF sinθ. Rotational equivalent of force. Larger lever arm = more torque. Net torque causes angular acceleration: τ_net = Iα.'},

// STATE
// ─────────────────────────────────────────────
let page='dashboard', unitIdx=null, tab='concepts', qIdx=0;
let unitAnswers={}, globalAnswers={};

// ─────────────────────────────────────────────
// RENDER ENGINE
// ─────────────────────────────────────────────
function render(){
  const el=document.getElementById('main');
  if(page==='dashboard') el.innerHTML=renderDashboard();
  else if(page==='unit') el.innerHTML=renderUnit(UNITS[unitIdx]);
  updateNav();
  el.scrollTop=0;
}

function updateNav(){
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  if(page==='dashboard') document.getElementById('nav-dashboard').classList.add('active');
  else if(page==='unit') document.getElementById('nav-u'+unitIdx).classList.add('active');
  const done=Object.keys(globalAnswers).length;
  const pct=Math.min(100,Math.round(done/4));
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-pct').textContent=pct+'%';
}

function showPage(p){page=p;render();}
function showUnit(i){unitIdx=i;page='unit';tab='concepts';qIdx=0;unitAnswers={};render();}
function switchTab(t){tab=t;if(t==='questions')qIdx=0;render();}

// ─────────────────────────────────────────────
// DASHBOARD
// ─────────────────────────────────────────────
function renderDashboard(){
  const totalQ=UNITS.reduce((s,u)=>s+u.questions.length,0);
  const done=Object.keys(globalAnswers).length;
  const correct=Object.values(globalAnswers).filter(Boolean).length;
  return `
  <div class="page-header">
    <div class="unit-chip">📚 AP Physics 1 · Georgia Standards</div>
    <div class="page-title">Your Learning Hub</div>
    <div class="page-subtitle">Master AP Physics 1 with interactive concept explanations, SVG diagrams, and ${totalQ}+ practice questions aligned to Georgia state curriculum standards.</div>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-val">${UNITS.length}</div><div class="stat-lbl">Course Units</div></div>
    <div class="stat-card"><div class="stat-val">${totalQ}+</div><div class="stat-lbl">Practice Questions</div></div>
    <div class="stat-card"><div class="stat-val">${done}</div><div class="stat-lbl">Attempted</div></div>
    <div class="stat-card"><div class="stat-val">${done>0?Math.round(correct/done*100):0}%</div><div class="stat-lbl">Accuracy</div></div>
  </div>
  <div class="units-header">All Units</div>
  ${UNITS.map((u,i)=>{
    const k='u'+i+'_';
    const d=Object.keys(globalAnswers).filter(x=>x.startsWith(k)).length;
    const c=Object.keys(globalAnswers).filter(x=>x.startsWith(k)&&globalAnswers[x]).length;
    return `<div class="unit-row" onclick="showUnit(${i})">
      <div class="unit-icon-box">${u.icon}</div>
      <div class="unit-info">
        <div class="unit-name">${u.tag}: ${u.title}</div>
        <div class="unit-desc">${u.sub.substring(0,70)}…</div>
      </div>
      <div class="unit-meta">
        <span class="q-pill">${d>0?c+'/'+d+' ✓':u.questions.length+'Q'}</span>
        <span class="arrow">›</span>
      </div>
    </div>`;
  }).join('')}`;
}

// ─────────────────────────────────────────────
// UNIT PAGE
// ─────────────────────────────────────────────
function renderUnit(u){
  return `
  <div class="page-header">
    <div class="unit-chip">${u.icon} ${u.tag}</div>
    <div class="page-title">${u.title}</div>
    <div class="page-subtitle">${u.sub}</div>
  </div>
  <div class="tabs">
    <button class="tab-btn ${tab==='concepts'?'active':''}" onclick="switchTab('concepts')">📚 Concepts & Diagrams</button>
    <button class="tab-btn ${tab==='questions'?'active':''}" onclick="switchTab('questions')">📝 Practice (${u.questions.length}Q)</button>
  </div>
  ${tab==='concepts'?renderConcepts(u):renderQuestions(u)}`;
}

function renderConcepts(u){
  return `
  <div class="concept-grid">
    ${u.concepts.map(c=>`<div class="concept-card">
      <div class="cc-icon">${c.icon}</div>
      <div class="cc-title">${c.title}</div>
      <div class="cc-desc">${c.desc}</div>
    </div>`).join('')}
  </div>
  <div class="formulas-box">
    <div class="formulas-title">Key Formulas — ${u.title}</div>
    <div class="formulas-grid">${u.formulas.map(f=>`<div class="formula-chip">${f}</div>`).join('')}</div>
  </div>
  ${getDiagram(u.id)}`;
}

// QUESTIONS
// ─────────────────────────────────────────────
function renderQuestions(u){
  const qs=u.questions;
  const q=qs[qIdx];
  const ans=unitAnswers[qIdx];
  const done=Object.keys(unitAnswers).length;
  const correct=Object.values(unitAnswers).filter(Boolean).length;
  const diff=q.diff==='easy'?'diff-easy':q.diff==='hard'?'diff-hard':'diff-med';
  return `
  <div class="q-topbar">
    <span class="q-counter-label">Question ${qIdx+1} of ${qs.length}</span>
    <span class="score-chip">${correct}/${done} correct</span>
  </div>
  <div class="question-card">
    <span class="diff-badge ${diff}">${q.diff}</span>
    <div class="q-number">Q ${qIdx+1}</div>
    <div class="q-text">${q.q}</div>
    <div class="q-options">
      ${q.opts.map((opt,i)=>{
        let cls='';
        if(ans!==undefined){cls=i===q.ans?'correct':(i===ans&&ans!==q.ans?'wrong':'');}
        return `<div class="opt ${cls}" onclick="${ans===undefined?`pickAnswer(${i})`:''}">
          <div class="opt-key">${'ABCD'[i]}</div>
          <div class="opt-text">${opt}</div>
        </div>`;
      }).join('')}
    </div>
    ${ans!==undefined?`<div class="explanation"><strong>Explanation:</strong> ${q.exp}</div>`:''}
  </div>
  <div class="q-nav-bar">
    <button class="btn btn-outline" onclick="prevQ()" ${qIdx===0?'disabled':''}>← Prev</button>
    <div class="q-dots">${qs.slice(0,50).map((_,i)=>{
      let c='dot';
      if(i===qIdx)c+=' current';
      else if(unitAnswers[i]!==undefined)c+=unitAnswers[i]?' ok':' bad';
      return `<div class="${c}" onclick="goQ(${i})" title="Q${i+1}"></div>`;
    }).join('')}</div>
    <button class="btn btn-primary" onclick="nextQ()">Next →</button>
  </div>`;
}

function pickAnswer(i){
  const q=UNITS[unitIdx].questions[qIdx];
  unitAnswers[qIdx]=i===q.ans;
  globalAnswers['u'+unitIdx+'_q'+qIdx]=i===q.ans;
  render();
}
function nextQ(){if(qIdx<UNITS[unitIdx].questions.length-1){qIdx++;render();}}
function prevQ(){if(qIdx>0){qIdx--;render();}}
function goQ(i){qIdx=i;render();}
